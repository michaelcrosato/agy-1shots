<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyberpunk Marble Physics</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #050510;
        font-family: 'Courier New', Courier, monospace;
        color: #00ffff;
        user-select: none;
      }
      #game-canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      #hud {
        position: absolute;
        top: 20px;
        left: 20px;
        pointer-events: none;
        background: rgba(11, 11, 35, 0.85);
        border: 2px solid #ff00ff;
        box-shadow:
          0 0 15px rgba(255, 0, 255, 0.4),
          inset 0 0 10px rgba(0, 255, 255, 0.2);
        padding: 15px;
        border-radius: 5px;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        z-index: 10;
      }
      .hud-title {
        font-size: 18px;
        font-weight: bold;
        color: #ff00ff;
        margin-bottom: 10px;
        border-bottom: 1px solid #00ffff;
        padding-bottom: 5px;
        text-shadow: 0 0 5px #ff00ff;
      }
      .hud-row {
        margin: 5px 0;
        display: flex;
        justify-content: space-between;
        gap: 20px;
      }
      .hud-label {
        color: #00ffff;
      }
      .hud-val {
        color: #ffffff;
        font-weight: bold;
      }
      #controls-tip {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        pointer-events: none;
        background: rgba(11, 11, 35, 0.85);
        border: 1px solid #00ffff;
        padding: 10px 20px;
        border-radius: 4px;
        text-align: center;
        font-size: 12px;
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        z-index: 10;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <div class="hud-title">NEON MATRIX v1.0</div>
      <div class="hud-row">
        <span class="hud-label">COORDS:</span
        ><span class="hud-val" id="coords">X: 0.00 Y: 0.00 Z: 0.00</span>
      </div>
      <div class="hud-row">
        <span class="hud-label">VELOCITY:</span><span class="hud-val" id="velocity">0.00 M/S</span>
      </div>
      <div class="hud-row">
        <span class="hud-label">TILT:</span><span class="hud-val" id="tilt">X: 0.00 Z: 0.00</span>
      </div>
      <button
        id="btn-accel"
        style="
          margin-top: 10px;
          padding: 5px 10px;
          background: #ff00ff;
          color: #ffffff;
          border: 1px solid #00ffff;
          font-family: inherit;
          font-size: 11px;
          cursor: pointer;
          text-shadow: 0 0 2px #ff00ff;
          pointer-events: auto;
          width: 100%;
          box-sizing: border-box;
        "
      >
        ACTIVATE MOBILE TILT
      </button>
    </div>
    <div id="controls-tip">
      [WASD / ARROWS] TILT GRID &bull; [MOUSE DRAG] ROTATE BOARD &bull; [SPACE / R] RESPAWN
    </div>
    <canvas id="game-canvas"></canvas>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
